<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      font-size: 13px;
      background: #0c0c0b;
      color: #ede8dc;
    }
    h1 {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8992a;
      margin: 0 0 12px 0;
    }
    .url-box {
      font-family: ui-monospace, monospace;
      font-size: 10px;
      word-break: break-all;
      color: #8a8478;
      min-height: 36px;
      padding: 8px;
      background: #141412;
      border: 1px solid #2a2a26;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .url-box.empty {
      color: #5c584e;
      font-style: italic;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 120px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 12px;
      border: 1px solid #2a2a26;
      background: #141412;
      color: #c8992a;
      cursor: pointer;
      border-radius: 2px;
    }
    button:hover:not(:disabled) {
      border-color: #c8992a;
      color: #f0ebe3;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 12px;
      font-size: 10px;
      color: #5c584e;
      line-height: 1.5;
    }
    .err {
      color: #c75c5c;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
    .err.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Frame</h1>
  <div id="last-url" class="url-box empty">No receipt yet — capture a tab or right‑click an image.</div>
  <div class="row">
    <button type="button" id="copy-btn" disabled>Copy URL</button>
    <button type="button" id="capture-btn">Capture visible tab</button>
  </div>
  <p id="err" class="err"></p>
  <p class="hint">Right‑click any image → <strong>Verify with Frame</strong>. API: edit <code>FRAME_CONFIG</code> in <code>background.js</code>.</p>
  <script src="popup.js"></script>
</body>
</html>
