services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: publiceye
      POSTGRES_PASSWORD: publiceye
      POSTGRES_DB: publiceye
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publiceye"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://publiceye:publiceye@db:5432/publiceye
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

volumes:
  pgdata:
